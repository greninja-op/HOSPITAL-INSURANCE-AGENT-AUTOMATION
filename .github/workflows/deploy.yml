name: Deploy

# AuthPilot deploys to Vercel. The simplest path is Vercel's native GitHub integration
# (auto-deploy on push to main) — in that case this workflow is optional. It is provided
# for teams that prefer an explicit, CI-gated deploy via the Vercel CLI.
#
# Datasource is PostgreSQL (Requirement 39). `prisma generate` runs automatically via the
# `postinstall` script on every install (locally, in CI, and during the Vercel build), so
# the Prisma client is always present. Apply schema changes to the production database with
# `npm run db:migrate` (prisma migrate deploy) once a migration history exists, or wire it
# into the Vercel build command.
#
# Runs only after CI succeeds on main. Requires repo secrets:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#
# (The reference project used SSH + docker compose to a self-hosted box — see
#  docs/DEPLOYMENT.md for that alternative if you self-host instead of using Vercel.)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
