name: CI

# AuthPilot CI — Node + Next.js + Prisma + Vitest/fast-check.
#
# Runs against a DISPOSABLE PostgreSQL service (Requirement 39 / design Testing
# Strategy): dev, test, and CI all use PostgreSQL. The schema is applied with
# `prisma db push` (no migration history is required for an ephemeral database),
# then the pipeline runs typecheck, lint, the test suite (unit + fast-check
# property tests), the gold-case evaluation (scripts/eval.ts), and the
# production build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Disposable PostgreSQL for the whole job. Exposed on localhost:5432.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: authpilot
          POSTGRES_PASSWORD: authpilot
          POSTGRES_DB: authpilot
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U authpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Point Prisma / the app at the disposable PostgreSQL service.
      DATABASE_URL: postgresql://authpilot:authpilot@localhost:5432/authpilot
      # Minimal required App_Configuration so boot-time validation (Req 38) and
      # the production build pass. These are throwaway CI values, not secrets;
      # the WhatsApp and Sarvam optional groups are intentionally left unset.
      QWEN_API_KEY: ci-dummy-key
      QWEN_API_BASE: https://example.com/compatible-mode/v1

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        # `postinstall` runs `prisma generate`, so the client is available here.
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply schema to disposable PostgreSQL
        run: npx prisma db push --skip-generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint --if-present

      - name: Test (unit + property-based)
        run: npm test

      - name: Gold-case evaluation
        run: npm run eval

      - name: Build
        run: npm run build
