# AuthPilot — local development stack.
#
# PostgreSQL is AuthPilot's datasource for dev, test, and CI (Requirement 39). Bring the
# database up with:
#
#   docker compose up -d postgres
#   # DATABASE_URL=postgresql://authpilot:authpilot@localhost:5433/authpilot
#   npx prisma db push          # apply the schema (or `prisma migrate dev`)
#   npm run dev
#
# Portability is preserved at the Prisma level: because AuthPilot uses no provider-specific
# constructs, DATABASE_URL can be repointed at any Prisma-supported engine that supports the
# Json type with no application-logic change (Requirement 39.2).
#
# The `app` service is optional and only needed for self-hosted parity (Vercel needs no
# container). Uncomment to run the whole thing in Docker.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: authpilot
      POSTGRES_PASSWORD: authpilot
      POSTGRES_DB: authpilot
    ports:
      - "5433:5432"
    volumes:
      - authpilot-pgdata:/var/lib/postgresql/data
      - ./infra/postgres/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # app:
  #   build: .
  #   env_file: ./.env
  #   environment:
  #     - DATABASE_URL=postgresql://authpilot:authpilot@postgres:5432/authpilot
  #     - PORT=3000
